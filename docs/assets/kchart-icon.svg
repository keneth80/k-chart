<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KChart icon</title>
  <desc id="desc">A metallic K monogram with a hybrid chart line.</desc>
  <defs>
    <linearGradient id="shell" x1="72" y1="44" x2="440" y2="468" gradientUnits="userSpaceOnUse">
      <stop stop-color="#223049"/>
      <stop offset="0.48" stop-color="#0B1320"/>
      <stop offset="1" stop-color="#182237"/>
    </linearGradient>
    <linearGradient id="stroke" x1="82" y1="70" x2="438" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F7FF" stop-opacity="0.9"/>
      <stop offset="0.34" stop-color="#5EDBFF"/>
      <stop offset="0.68" stop-color="#35F2A0"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="kfill" x1="132" y1="112" x2="336" y2="398" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.42" stop-color="#BEEBFF"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="13" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.20 0 0 0 0 0.85 0 0 0 0 1.00 0 0 0 0.65 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>

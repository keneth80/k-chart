      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect x="42" y="42" width="428" height="428" rx="96" fill="url(#shell)" filter="url(#softShadow)"/>
  <rect x="54" y="54" width="404" height="404" rx="84" stroke="url(#stroke)" stroke-opacity="0.72" stroke-width="8"/>
  <path d="M112 120H160V231L272 120H337L215 238L350 392H285L185 273L160 298V392H112V120Z" fill="url(#kfill)"/>
  <path d="M142 382C196 310 229 334 272 270C316 204 354 236 400 154" stroke="url(#stroke)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M142 382C196 310 229 334 272 270C316 204 354 236 400 154" stroke="#08111F" stroke-opacity="0.36" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="142" cy="382" r="18" fill="#5EDBFF" stroke="#F8FBFF" stroke-width="8"/>
  <circle cx="272" cy="270" r="18" fill="#35F2A0" stroke="#F8FBFF" stroke-width="8"/>
  <circle cx="400" cy="154" r="18" fill="#FBBF24" stroke="#F8FBFF" stroke-width="8"/>
  <path d="M94 96H418" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="6" stroke-linecap="round"/>

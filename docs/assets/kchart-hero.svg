  <text x="258" y="91" fill="#9FB0C7" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="600">Class-free hybrid chart runtime for SVG, Canvas, WebGL and custom 3D renderers</text>


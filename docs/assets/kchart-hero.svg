<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KChart hybrid chart engine preview</title>
  <desc id="desc">A dark metallic dashboard preview showing SVG, Canvas, WebGL, globe, and wafer monitoring chart layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B12"/>
      <stop offset="0.52" stop-color="#111C2A"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="panel" x1="128" y1="60" x2="1152" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D2938" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#0C1420" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="line" x1="176" y1="328" x2="760" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EDBFF"/>
      <stop offset="0.5" stop-color="#8B7CFF"/>
      <stop offset="1" stop-color="#35F2A0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="wafer" x1="850" y1="140" x2="1080" y2="370" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A5F"/>
      <stop offset="0.45" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#10233D"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.28 0 0 0 0 0.78 0 0 0 0 1 0 0 0 0.85 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#93A4B8" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1280" height="520" rx="34" fill="url(#bg)"/>

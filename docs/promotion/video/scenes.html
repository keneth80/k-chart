<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KChart hybrid rendering promo scenes</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        background: #0b1017;
        color: #edf3f8;
        font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }
      .scene {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle at 72% 18%, rgba(93,184,255,.18), transparent 36%), #0b1017;
      }
      .background {
        position: absolute;
        inset: -16px;
        width: calc(100% + 32px);
        height: calc(100% + 32px);
        object-fit: cover;
        filter: brightness(.5) saturate(.9);
      }
      .veil { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(6,10,16,.94), rgba(6,10,16,.2) 72%), linear-gradient(0deg, rgba(6,10,16,.84), transparent 55%); }
      .content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 72px 82px; }
      .brand { color: #5db8ff; font-size: 20px; font-weight: 800; }
      h1 { max-width: 970px; margin: 12px 0 18px; font-size: 62px; line-height: 1.13; letter-spacing: 0; }
      p { max-width: 900px; margin: 0; color: #c5d2dc; font-size: 27px; line-height: 1.45; }
      .tokens { display: flex; gap: 14px; margin-top: 30px; }
      .token { border: 1px solid rgba(143,216,255,.36); border-radius: 7px; background: rgba(18,31,44,.82); padding: 11px 16px; font-size: 20px; font-weight: 800; }
      .accent { color: #56d08f; }
      .accent-warm { color: #f3b45b; }
      .end { justify-content: center; align-items: center; text-align: center; }
      .end h1 { font-size: 56px; }
      .end p { font-size: 22px; }
      .links { margin-top: 34px; color: #8fd8ff; font-size: 20px; line-height: 1.8; }
      .diagram { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 34px; }
      .node { border: 1px solid rgba(219,232,242,.24); border-radius: 8px; background: rgba(21,28,38,.9); padding: 18px 22px; font-size: 21px; font-weight: 800; }
      .arrow { color: #5db8ff; font-size: 28px; }
    </style>
  </head>
  <body>
    <main id="scene" class="scene"></main>
    <script>
      const scene = Number(new URLSearchParams(location.search).get('scene') || 1);
      const scenes = {
        1: { bg: '../assets/playground-svg-line.png', title: '하나의 좌표계.\n세 가지 렌더러.', body: '축과 scale은 공유하고, 표현 방식은 데이터와 interaction에 맞게 선택합니다.', tokens: ['SVG', 'Canvas 2D', 'WebGL'] },
        2: { bg: '../assets/playground-svg-line.png', title: 'SVG', body: '선명한 축, 개별 DOM 요소, 정교한 hover와 click.', tokens: ['Small data', 'DOM interaction', 'Vector UI'] },
        3: { bg: '../assets/playground-canvas-line.png', title: 'Canvas 2D', body: '많은 도형과 반복되는 업데이트를 하나의 bitmap surface에서 처리합니다.', tokens: ['Realtime', 'Fast redraw', 'Operational UI'] },
        4: { bg: '../assets/playground-webgl.png', title: 'WebGL BigData', body: '대량의 line과 point를 GPU buffer와 draw call로 렌더링합니다.', tokens: ['GPU', 'LTTB', 'Interleaved buffer'] },
        5: { bg: '../assets/playground-realtime.png', title: '데이터는 흐르고,\nwindow는 고정됩니다.', body: '최근 1시간만 유지해 자연스러운 실시간 이동과 안정적인 메모리를 함께 만듭니다.', tokens: ['updateData()', 'Fixed window', 'Smooth timeline'] }
      };
      if (scene <= 5) {
        const item = scenes[scene];
        document.getElementById('scene').innerHTML = `
          <img class="background" src="${item.bg}" alt="" />
          <div class="veil"></div>
          <section class="content">
            <div class="brand">KChart · Hybrid rendering runtime</div>
            <h1>${item.title.replaceAll('\n', '<br>')}</h1>
            <p>${item.body}</p>
            <div class="tokens">${item.tokens.map(token => `<span class="token">${token}</span>`).join('')}</div>
          </section>`;
      } else {
        document.getElementById('scene').innerHTML = `
          <section class="content end">
            <div class="brand">KChart</div>
            <h1>Scale은 공유하고<br><span class="accent">표현은 교체합니다.</span></h1>
            <div class="diagram">
              <span class="node">Core · axis & scale</span><span class="arrow">→</span>
              <span class="node">SVG</span><span class="node">Canvas</span><span class="node">WebGL</span>
            </div>
            <div class="links">k-chart-playground.vercel.app<br>k-chart-bench.vercel.app<br>github.com/keneth80/k-chart</div>
          </section>`;
      }
    </script>
  </body>
</html>

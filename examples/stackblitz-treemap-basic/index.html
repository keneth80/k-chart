<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KChart Treemap</title>
  </head>
  <body>
    <main class="page-shell">
      <section class="intro">
        <p class="eyebrow">StackBlitz starter</p>
        <h1>KChart Treemap</h1>
        <p>Compare product revenue at a glance while keeping each product category visually distinct.</p>
      </section>
      <section class="chart-panel">
        <div class="metric-strip">
          <span>area = revenue</span>
          <span>label = product</span>
          <span>color = category</span>
        </div>
        <div id="chart"></div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KChart Worker JSON Line</title>
  </head>
  <body>
    <main class="page-shell">
      <section class="intro">
        <p class="eyebrow">KChart StackBlitz</p>
        <h1>JSON data + OffscreenCanvas Worker</h1>
        <p>
          The chart fetches <code>/data/large-line.json</code> first, then uses
          <code>asyncRender.workerFactory</code> only for Canvas/WebGL line drawing.
        </p>
      </section>

      <section class="status-grid" aria-label="Runtime status">
        <div>
          <span>Data source</span>
          <strong id="data-status">loading...</strong>
        </div>
        <div>
          <span>OffscreenCanvas</span>
          <strong id="offscreen-status">checking...</strong>
        </div>
        <div>
          <span>Worker factory</span>
          <strong id="worker-status">not called</strong>
        </div>
      </section>

      <section class="chart-panel">
        <div id="chart"></div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

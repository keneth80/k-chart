<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KChart Simple API</title>
  </head>
  <body>
    <main class="page-shell">
      <section class="intro">
        <p class="eyebrow">StackBlitz starter</p>
        <h1>KChart Simple API</h1>
        <p>Start with <code>createLineChart</code>, then switch to <code>chartConfig(...)</code> when you need composition.</p>
      </section>

      <section class="chart-grid">
        <article class="chart-panel">
          <h2>Preset function</h2>
          <div id="line-chart"></div>
        </article>
        <article class="chart-panel">
          <h2>Builder function</h2>
          <div id="column-chart"></div>
        </article>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

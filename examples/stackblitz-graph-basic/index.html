<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KChart Graph Chart</title>
  </head>
  <body>
    <main class="page-shell">
      <section class="intro">
        <p class="eyebrow">StackBlitz starter</p>
        <h1>KChart Graph Chart</h1>

        <div class="metric-strip">

        <div id="chart"></div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
